<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TIFF Viewer</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="toolbar" id="controls" hidden>
        <div class="toolbar__group">
          <button class="button" id="go-back" type="button">Back</button>
          <button class="button button--ghost" id="zoom-out" type="button" aria-label="Zoom out">-</button>
          <button class="button" id="fit-width" type="button">Fit Width</button>
          <button class="button" id="actual-size" type="button">100%</button>
          <button class="button button--ghost" id="zoom-in" type="button" aria-label="Zoom in">+</button>
          <span class="zoom-readout" id="zoom-readout">100%</span>
        </div>
        <div class="toolbar__group toolbar__group--end">
          <button class="button button--accent" id="print-view" type="button">Print</button>
          <a class="button button--link" id="open-source" rel="noreferrer noopener" target="_blank">Open Original</a>
        </div>
      </div>
      <p class="status" id="status">Preparing renderer...</p>
      <p class="error" id="error" hidden></p>

      <div class="viewport" id="viewport" hidden>
        <div class="page" id="page">
          <img class="preview" id="preview" alt="Rendered TIFF output" hidden>
        </div>
      </div>

      <div class="meta" id="meta" hidden>
        <p class="meta__label">Original request</p>
        <a id="source-link" rel="noreferrer noopener" target="_blank"></a>
      </div>
    </section>
  </main>

  <script src="viewer.js"></script>
</body>
</html>
